name: Build GPU Wheel

# GPU (ONNX CUDA/TensorRT) 対応 wheel のオンデマンドビルド．
# Colab での Rust ビルド時間 (従量課金) を消すため，事前ビルドした wheel と
# ONNX Runtime provider ライブラリ群を Release (latest-gpu) に添付する．
# 使い方は docs/design/position-search/benchmarking.md を参照．
on:
  workflow_dispatch:

concurrency:
  group: build-gpu-wheel
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    # Colab (Ubuntu 22.04 / glibc 2.35) と同じ glibc でビルドする．
    # manylinux コンテナを使わないのは，ort がビルド時に $HOME/.cache へ
    # ダウンロードする provider .so 群をビルド後の step で回収するため
    # (コンテナ内 $HOME は step 終了で消える)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12

      - name: Install build tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y clang lld
          pipx install maturin

      - uses: Swatinem/rust-cache@v2

      - name: Build GPU wheels (onnx-cuda + onnx-tensorrt)
        run: |
          maturin build --release --out dist \
            -i python3.11 -i python3.12 \
            --features pyo3/extension-module,onnx-cuda,onnx-tensorrt

      - name: Collect ONNX Runtime provider libraries
        run: |
          # onnxruntime 本体は wheel (_rust.so) に静的リンク済み．実行時に
          # dlopen される provider 3 つだけを tar 化して配布する
          # (Colab 側で展開して ldconfig 登録する)
          mkdir -p ort-libs
          for name in libonnxruntime_providers_shared.so \
                      libonnxruntime_providers_cuda.so \
                      libonnxruntime_providers_tensorrt.so; do
            src=$(find "$HOME/.cache/ort.pyke.io" -name "$name" -type f | head -1)
            if [ -z "$src" ]; then
              echo "::error::$name not found in ort cache"
              exit 1
            fi
            cp "$src" ort-libs/
          done
          tar czf onnxruntime-gpu-providers.tar.gz -C ort-libs .
          du -h dist/*.whl onnxruntime-gpu-providers.tar.gz

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest-gpu --yes --cleanup-tag || true

      - name: Extract version
        id: version
        run: |
          version=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'^version\s*=\s*\"([^\"]+)\"', f.read(), re.MULTILINE)
              print(m.group(1))
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls dist/*.whl 1>/dev/null 2>&1 || { echo "::error::No wheel files found in dist/"; exit 1; }
          gh release create latest-gpu \
            --title "GPU Build (v${{ steps.version.outputs.version }})" \
            --notes "Prebuilt GPU wheels (ONNX CUDA/TensorRT enabled) for Colab.

          - **Version**: ${{ steps.version.outputs.version }}
          - **Commit**: ${{ github.sha }} (ref: ${{ github.ref_name }})
          - **Built at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Platform**: linux x86_64 (glibc 2.35 = Ubuntu 22.04 / Colab)
          - **Python**: CPython 3.11, 3.12
          - **Cargo features**: onnx-cuda, onnx-tensorrt
          - \`onnxruntime-gpu-providers.tar.gz\`: dlopen される provider 3 つ
            (shared/cuda/tensorrt)．展開して ldconfig に登録する
          - ランタイム要件: CUDA 12 + TensorRT 10 (\`pip install 'tensorrt-cu12==10.*'\`)

          手順: docs/design/position-search/benchmarking.md" \
            --latest=false \
            dist/*.whl onnxruntime-gpu-providers.tar.gz
