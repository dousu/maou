name: Build GPU Wheel

# GPU (ONNX CUDA/TensorRT) 対応 wheel のオンデマンドビルド．
# Colab での Rust ビルド時間 (従量課金) を消すため，事前ビルドした wheel を
# Release (latest-gpu) に添付する．ONNX Runtime provider (.so) は Colab 側で
# pip の onnxruntime-gpu (capi/) から供給する — wheel の静的コアと同版
# (onnxruntime 1.22) に pin 済み (maou[tensorrt-infer])．
# 使い方は docs/design/position-search/benchmarking.md を参照．
on:
  workflow_dispatch:
  # workflow_dispatch はデフォルトブランチにファイルが存在しないと起動
  # できないため，main マージ前の暫定として本ブランチの関連変更で起動する
  # (マージ後にこの push トリガーは削除してよい)
  push:
    branches: [feat/position-search]
    paths:
      - "rust/**"
      - "src/maou/**"
      - "pyproject.toml"
      - ".github/workflows/build-gpu-wheel.yml"

concurrency:
  group: build-gpu-wheel
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    # Colab (Ubuntu 22.04 / glibc 2.35) と同じ glibc でビルドし，wheel の
    # manylinux タグを Colab に合わせる．
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12

      - name: Install build tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y clang lld
          pipx install maturin

      - uses: Swatinem/rust-cache@v2

      - name: Build GPU wheels (onnx-cuda + onnx-tensorrt)
        run: |
          maturin build --release --out dist \
            -i python3.11 -i python3.12 \
            --features pyo3/extension-module,onnx-cuda,onnx-tensorrt

      - name: Show wheel sizes
        run: du -h dist/*.whl

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest-gpu --yes --cleanup-tag || true

      - name: Extract version
        id: version
        run: |
          version=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'^version\s*=\s*\"([^\"]+)\"', f.read(), re.MULTILINE)
              print(m.group(1))
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls dist/*.whl 1>/dev/null 2>&1 || { echo "::error::No wheel files found in dist/"; exit 1; }
          gh release create latest-gpu \
            --title "GPU Build (v${{ steps.version.outputs.version }})" \
            --notes "Prebuilt GPU wheels (ONNX CUDA/TensorRT enabled) for Colab.

          - **Version**: ${{ steps.version.outputs.version }}
          - **Commit**: ${{ github.sha }} (ref: ${{ github.ref_name }})
          - **Built at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Platform**: linux x86_64 (glibc 2.35 = Ubuntu 22.04 / Colab)
          - **Python**: CPython 3.11, 3.12
          - **Cargo features**: onnx-cuda, onnx-tensorrt
          - ランタイム要件: pip の onnxruntime-gpu 1.22 (provider .so) +
            tensorrt-cu12 10 系 + CUDA 12．\`pip install 'maou[tensorrt-infer] @ <wheel>'\`
            が版一致で揃える (別途 tarball は不要)．

          手順: docs/design/position-search/benchmarking.md" \
            --latest=false \
            dist/*.whl
